apiVersion: apps/v1
kind: Deployment
metadata:
  name: r3vp-api
  namespace: r3vp
  labels:
    app: r3vp-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: r3vp-api
  template:
    metadata:
      labels:
        app: r3vp-api
    spec:
      # Enforce non-root execution at the pod level
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/r3vp/r3vp-api:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          # Container-level security context: drop all capabilities, read-only FS
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: R3VP_API_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: r3vp-api-secrets
                  key: database-url
            - name: R3VP_API_AUTH0_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: r3vp-api-config
                  key: auth0-domain
            - name: R3VP_API_AUTH0_AUDIENCE
              valueFrom:
                configMapKeyRef:
                  name: r3vp-api-config
                  key: auth0-audience
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          # Writable tmp dirs mounted as emptyDir so the root FS can stay read-only
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: reports
              mountPath: /var/r3vp/reports
      volumes:
        - name: tmp
          emptyDir: {}
        - name: reports
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: r3vp-api
  namespace: r3vp
spec:
  selector:
    app: r3vp-api
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
