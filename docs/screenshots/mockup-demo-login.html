<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in - R3VP Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: #F8FAFC;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .logo {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -1px;
    color: #0F172A;
    margin-bottom: 8px;
    text-align: center;
  }
  .logo em {
    color: #00B336;
    font-style: normal;
  }
  .demo-badge {
    display: inline-block;
    background: #F0FDF4;
    color: #15803D;
    border: 1px solid #BBF7D0;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 6px;
    margin-bottom: 16px;
  }
  .subtitle {
    font-size: 14px;
    color: #475569;
    text-align: center;
    max-width: 340px;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .card {
    background: #FFFFFF;
    border: 1px solid #E2E8F0;
    border-radius: 12px;
    padding: 28px;
    width: 100%;
    max-width: 400px;
  }
  .card-title {
    font-size: 18px;
    font-weight: 600;
    color: #0F172A;
    margin-bottom: 20px;
  }
  .google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 10px 16px;
    background: #FFFFFF;
    border: 1px solid #E2E8F0;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    color: #0F172A;
    cursor: pointer;
    transition: background 0.15s;
  }
  .google-btn:hover { background: #F8FAFC; }
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: #E2E8F0;
  }
  .divider-text {
    font-size: 12px;
    color: #94A3B8;
    font-weight: 500;
  }
  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #0F172A;
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid #E2E8F0;
    border-radius: 8px;
    font-size: 14px;
    color: #0F172A;
    background: #FFFFFF;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: #00B336; box-shadow: 0 0 0 3px rgba(0,179,54,0.1); }
  .field input::placeholder { color: #94A3B8; }
  .signin-btn {
    width: 100%;
    padding: 10px 16px;
    background: #00B336;
    color: #FFFFFF;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: background 0.15s;
  }
  .signin-btn:hover { background: #009B2E; }
  .toggle-link {
    margin-top: 16px;
    text-align: center;
    font-size: 13px;
    color: #475569;
  }
  .toggle-link a {
    color: #00B336;
    text-decoration: none;
    font-weight: 500;
  }
  .toggle-link a:hover { text-decoration: underline; }
  .footer {
    margin-top: 28px;
    font-size: 12px;
    color: #94A3B8;
    text-align: center;
    max-width: 360px;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <div class="logo">R<em>3</em>VP</div>
  <div class="demo-badge">Demo Environment</div>
  <p class="subtitle">Sign in to explore the R3VP platform with sample recovery validation data.</p>

  <div class="card">
    <div class="card-title">Sign in to demo</div>

    <button class="google-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">OR</span>
      <div class="divider-line"></div>
    </div>

    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>

    <button class="signin-btn">Sign in</button>
  </div>

  <div class="toggle-link">
    No account yet? <a href="#">Create one</a>
  </div>

  <div class="footer">
    Demo data only. No real infrastructure is connected. Built by Omar Rao - Engineer, Data Resilience
  </div>
</body>
</html>
