services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      R3VP_API_DATABASE_URL: postgresql+asyncpg://r3vp:r3vp@db:5432/r3vp
      R3VP_API_REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: r3vp
      POSTGRES_PASSWORD: r3vp
      POSTGRES_DB: r3vp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U r3vp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
