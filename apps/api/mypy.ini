[mypy]
python_version = 3.12
strict = false
ignore_missing_imports = true
# Annotation coverage is not enforced (style, not correctness); mypy still
# checks the annotations that are present and flags real type errors.
disallow_untyped_defs = false
warn_return_any = false

[mypy-weasyprint.*]
ignore_missing_imports = true
[mypy-jwt.*]
ignore_missing_imports = true
