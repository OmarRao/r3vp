[mypy]
python_version = 3.12
strict = false
ignore_missing_imports = true
disallow_untyped_defs = true
warn_return_any = false

[mypy-pyVmomi.*]
ignore_missing_imports = true
[mypy-pyVim.*]
ignore_missing_imports = true
[mypy-winrm.*]
ignore_missing_imports = true
[mypy-paramiko.*]
ignore_missing_imports = true
