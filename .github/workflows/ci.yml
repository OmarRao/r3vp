name: CI

on:
  push:
    branches: [master, develop]
  pull_request:

jobs:
  lint-and-test-appliance:
    name: Appliance — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/appliance
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          version: "latest"
      - run: uv sync --extra dev
      - run: uv run ruff check src/ health_checks/
      - run: uv run mypy src/ health_checks/ --ignore-missing-imports
        continue-on-error: true  # mypy is advisory; annotation coverage not enforced
      - run: uv run pytest tests/ -v

  lint-and-test-api:
    name: API — lint & test (unit, no DB)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          version: "latest"
      - run: uv sync --extra dev
      - run: uv run ruff check src/
      - run: uv run mypy src/ --ignore-missing-imports
        continue-on-error: true  # mypy is advisory; annotation coverage not enforced
      - run: uv run pytest tests/ -v -m "not integration"
        env:
          R3VP_API_DATABASE_URL: postgresql+asyncpg://r3vp:r3vp@localhost:5432/r3vp
          R3VP_API_AUTH0_DOMAIN: placeholder.auth0.com
          R3VP_API_AUTH0_AUDIENCE: https://api.r3vp.io

  integration-test-api:
    name: API — integration tests (with Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: r3vp
          POSTGRES_PASSWORD: r3vp
          POSTGRES_DB: r3vp
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          version: "latest"
      - run: uv sync --extra dev
      - name: Run migrations
        run: uv run alembic upgrade head
        env:
          R3VP_API_DATABASE_URL: postgresql+asyncpg://r3vp:r3vp@localhost:5432/r3vp
      - run: uv run pytest tests/ -v -m integration
        env:
          R3VP_API_DATABASE_URL: postgresql+asyncpg://r3vp:r3vp@localhost:5432/r3vp
          R3VP_API_AUTH0_DOMAIN: placeholder.auth0.com
          R3VP_API_AUTH0_AUDIENCE: https://api.r3vp.io
        continue-on-error: true  # no integration tests yet — remove flag in Phase 3

  lint-portal:
    name: Portal — type check & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/portal
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/portal/package-lock.json
      - run: npm ci || npm install
      - run: npm run type-check
      - run: npm run lint

  docker-build:
    name: Docker builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build appliance image
        run: docker build -t r3vp-appliance:ci apps/appliance/
      - name: Build API image
        run: docker build -t r3vp-api:ci apps/api/
